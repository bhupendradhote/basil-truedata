<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basil TrueData Institutional Chart</title>
    <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { 
            --bg: #0d1117; 
            --panel: #161b22; 
            --text: #c9d1d9; 
            --accent: #2f81f7; 
            --border: #30363d; 
            --success: #3fb950; 
            --danger: #f85149; 
            --strategy: #8957e5;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            max-width: 1400px; 
            margin: 0 auto; 
            background: var(--bg); 
            color: var(--text); 
        }
        h1 { text-align: center; color: var(--text); margin-bottom: 30px; font-weight: 600; letter-spacing: -0.5px; }
        
        .toolbar { 
            background: var(--panel); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            display: flex; 
            gap: 20px; 
            align-items: center; 
            flex-wrap: wrap; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .toolbar-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 12px; color: #8b949e; font-weight: bold; text-transform: uppercase; }
        select, input, button { 
            padding: 10px 14px; 
            font-size: 14px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            background: var(--bg); 
            color: var(--text); 
            outline: none; 
        }
        select:focus, input:focus { border-color: var(--accent); }
        button { 
            background: var(--accent); 
            color: white; 
            cursor: pointer; 
            font-weight: 600; 
            border: none; 
            margin-top: 22px; 
            padding: 10px 24px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        .btn-strategy { background: var(--strategy); margin-left: 5px; }

        #status-bar { font-family: monospace; font-size: 13px; padding: 10px 0 20px 0; color: #8b949e; }
        
        #chart-wrapper { 
            position: relative; 
            width: 100%; 
            height: 600px; 
            background: var(--bg); 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            overflow: hidden;
            margin-bottom: 30px;
            display: none;
        }
        #chart-container { width: 100%; height: 100%; }
        
        #legend { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            z-index: 10; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 14px; 
            background: rgba(22, 27, 34, 0.85); 
            padding: 12px; 
            border-radius: 6px; 
            pointer-events: none; 
            border: 1px solid var(--border); 
            line-height: 1.4;
        }

        .rules-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .rules-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
        .rules-card h3 { margin-top: 0; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .rules-card.bullish h3 { color: var(--success); }
        .rules-card.bearish h3 { color: var(--danger); }
        
        .rules-list { list-style: none; padding: 0; margin: 0; font-size: 13px; color: #8b949e; max-height: 400px; overflow-y: auto; }
        .rules-list li { padding: 8px 0; border-bottom: 1px solid rgba(48, 54, 61, 0.5); display: flex; gap: 10px; }
        .rules-list li span { font-weight: bold; color: var(--text); min-width: 25px; }

        #current-status { background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; display: none; }
        #current-status .header-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; color: var(--text); }
        #current-status .score-line { font-weight: bold; font-size: 15px; }
        #current-status .bullish { color: var(--success); }
        #current-status .bearish { color: var(--danger); }
        
        .matched-rules-wrapper { display: none; justify-content: center; gap: 20px; margin-top: 15px; text-align: left; }
        .matched-rules-col { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); border-radius: 6px; padding: 15px; flex: 1; max-width: 450px; }
        .matched-rules-col h4 { margin: 0 0 10px 0; font-size: 14px; }
        .matched-rules-col ul { list-style: none; padding: 0; margin: 0; font-size: 13px; color: #c9d1d9; }
        .matched-rules-col ul li { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; gap: 8px; }
        .matched-rules-col ul li:last-child { border-bottom: none; }

        #trades-table { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; display: none; overflow-x: auto; }
        #trades-table h3 { margin-top: 0; color: var(--accent); }
        #trades-table table { width: 100%; border-collapse: collapse; font-size: 13px; }
        #trades-table th, #trades-table td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        #trades-table th { background: var(--bg); color: var(--accent); }
        #trades-table tr:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <h1>📈 True Data Terminal</h1>
    
    <div class="toolbar">
        <div class="toolbar-group">
            <label>1. Select Market</label>
            <select id="category" onchange="fetchSymbols()">
                <option value="" disabled selected>Select Category...</option>
                <option value="NSE_EQ">NSE Equities (Stocks)</option>
                <option value="NSE_INDICES">NSE Indices (Nifty, etc.)</option>
                <option value="NSE_FUT_CONT">NSE Futures</option>
                <option value="NSE_OPT_CONT">NSE Options</option>
                <option value="BSE_EQ">BSE Equities</option>
            </select>
        </div>

        <div class="toolbar-group">
            <label>2. Select Symbol</label>
            <select id="symbol-dropdown" style="min-width: 250px;">
                <option value="">Waiting for market selection...</option>
            </select>
        </div>

        <div class="toolbar-group">
            <label>3. Timeframe</label>
            <select id="barsize">
                <option value="1 min">1 Min (Intraday)</option>
                <option value="5 min" selected>5 Min (Intraday)</option>
                <option value="15 min">15 Min (Short-Term)</option>
                <option value="60 min">1 Hour (Medium-Term)</option>
                <option value="EOD">Daily (Macro)</option>
            </select>
        </div>

        <button class="btn-strategy" onclick="runStrategy()">Run Institutional Strategy</button>
    </div>

    <div id="status-bar">System Ready. Select a market category to begin.</div>

    <div id="chart-wrapper">
        <div id="legend"></div>
        <div id="chart-container"></div>
    </div>

    <div id="current-status"></div>
    <div id="trades-table"></div>

    <h2 style="font-size: 18px; margin-top: 10px;">Institutional Confluence Strategy</h2>
    <div class="rules-container">
        <div class="rules-card bullish">
            <h3>🟢 Bullish Conditions (Trigger requires 19/19)</h3>
            <ul class="rules-list" id="ui-bullish-rules"></ul>
        </div>
        
        <div class="rules-card bearish">
            <h3>🔴 Bearish Conditions (Trigger requires 18/18)</h3>
            <ul class="rules-list" id="ui-bearish-rules"></ul>
        </div>
    </div>

    <script>
        const API_BASE = "/api"; 
        let chart, candleSeries, volSeries;

        const BULLISH_RULE_NAMES = [
            "5m ADX (14) > 30 (Strong Trend)",
            "5m Close > Last 4 Days Max Close",
            "5m High > First 5m High of the Day",
            "5m Close >= Highest High of last 18 candles",
            "4h Fast Stochastic > Slow Stochastic",
            "4h Close > 4h EMA (9)",
            "Prev 4h Close > Prev 4h EMA (9)",
            "4h Close > 4h EMA (50)",
            "1h RSI (14) > 60",
            "1h EMA (9) > 1h EMA (50)",
            "15m MACD Line > Signal Line",
            "15m HA EMA (5) > HA EMA (9)",
            "5m Close > Daily VWAP",
            "5m EMA (20) > 5m EMA (50)",
            "5m OBV > 5m OBV EMA (5)",
            "Body Size > 55% of High-Low Range",
            "Last 10-candle H-L range < 5 × ATR (14)",
            "5m Volume > Avg 2x Volume of last 200 candles",
            "5m Close > Yesterday's High"
        ];
        
        const BEARISH_RULE_NAMES = [
            "5m ADX (14) > 30 (Strong Trend)",
            "5m Low < First 5m Low of the Day",
            "5m Close <= Lowest Low of last 18 candles",
            "5m Close < Yesterday's Low",
            "4h Fast Stochastic < Slow Stochastic",
            "4h Close < 4h EMA (9)",
            "Prev 4h Close < Prev 4h EMA (9)",
            "4h Close < 4h EMA (50)",
            "1h RSI (14) < 40",
            "1h EMA (9) < 1h EMA (50)",
            "15m MACD Line < Signal Line",
            "15m HA EMA (5) < HA EMA (9)",
            "5m Close < Daily VWAP",
            "5m EMA (20) < 5m EMA (50)",
            "5m OBV < 5m OBV EMA (5)",
            "Body Size > 55% of High-Low Range",
            "Last 10-candle H-L range < 5 × ATR (14)",
            "5m Volume > Avg 2x Volume of last 200 candles"
        ];

        // Populate Static Rules UI
        document.getElementById('ui-bullish-rules').innerHTML = BULLISH_RULE_NAMES.map((r, i) => `<li><span>${i+1}</span> ${r}</li>`).join('');
        document.getElementById('ui-bearish-rules').innerHTML = BEARISH_RULE_NAMES.map((r, i) => `<li><span>${i+1}</span> ${r}</li>`).join('');

        function initChart() {
            if (chart) return; 
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#0d1117' }, textColor: '#8b949e' },
                grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: '#30363d' },
                timeScale: { borderColor: '#30363d', timeVisible: true }
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#3fb950', downColor: '#f85149', 
                borderVisible: false, wickUpColor: '#3fb950', wickDownColor: '#f85149',
                priceFormat: { type: 'price', precision: 2, minMove: 0.05 }
            });

            volSeries = chart.addHistogramSeries({
                priceFormat: { type: 'volume' },
                priceScaleId: '', 
                scaleMargins: { top: 0.8, bottom: 0 } 
            });

            new ResizeObserver(entries => {
                if (entries.length === 0 || entries[0].target !== document.getElementById('chart-wrapper')) return;
                chart.applyOptions({ width: entries[0].contentRect.width, height: entries[0].contentRect.height });
            }).observe(document.getElementById('chart-wrapper'));

            chart.subscribeCrosshairMove((param) => {
                const legend = document.getElementById('legend');
                if (!param.time || param.point.x < 0 || param.point.y < 0) { legend.style.display = 'none'; return; }
                const price = param.seriesData.get(candleSeries);
                const vol = param.seriesData.get(volSeries);
                if (price) {
                    const symName = document.getElementById('symbol-dropdown').value;
                    legend.style.display = 'block';
                    legend.innerHTML = `
                        <span style="color:#58a6ff; font-weight:bold; font-size:16px;">${symName}</span><br>
                        O: ${price.open.toFixed(2)}<br>
                        H: ${price.high.toFixed(2)}<br>
                        L: ${price.low.toFixed(2)}<br>
                        C: ${price.close.toFixed(2)}<br>
                        V: ${vol ? vol.value.toLocaleString() : 0}
                    `;
                }
            });
        }

        async function fetchSymbols() {
            const category = document.getElementById('category').value;
            const dropdown = document.getElementById('symbol-dropdown');
            const status = document.getElementById('status-bar');

            status.innerHTML = `⏳ Fetching official master list for ${category}...`;
            status.style.color = "var(--text)";
            dropdown.innerHTML = '<option>Loading...</option>';

            try {
                const res = await fetch(`${API_BASE}/symbols/${category}`);
                if (!res.ok) throw new Error(`API Error ${res.status}`);
                const data = await res.json();

                dropdown.innerHTML = ''; 
                data.symbols.forEach(sym => {
                    let opt = document.createElement('option');
                    opt.value = sym;
                    opt.innerHTML = sym;
                    dropdown.appendChild(opt);
                });
                
                status.innerHTML = `✅ Loaded <b>${data.total_count}</b> symbols. Select one and click Run.`;
                status.style.color = "var(--success)";
            } catch (err) {
                status.innerHTML = "❌ Failed to fetch symbols. Make sure your FastAPI server is running.";
                status.style.color = "var(--danger)";
                dropdown.innerHTML = '<option>Error loading symbols</option>';
            }
        }

        async function runStrategy() {
            const symbol = document.getElementById('symbol-dropdown').value;
            const status = document.getElementById('status-bar');

            if (!symbol || symbol === "Loading...") { alert("Please fetch a market category and select a symbol first."); return; }

            status.innerHTML = `⏳ Analyzing multi-timeframe data for ${symbol}. Pulling 2 Years of data...`;
            status.style.color = "var(--text)";

            try {
                const url = `${API_BASE}/strategy/${encodeURIComponent(symbol)}?duration=2 Y`;
                const res = await fetch(url);
                if (!res.ok) throw new Error("API error. Ensure your FastAPI server is running.");
                
                const data = await res.json();
                initChart(); 
                document.getElementById('chart-wrapper').style.display = 'none';

                const rawData = data.data || [];
                const signalsData = data.signals || [];
                const candles = [], volumes = [];
                let lastTime = null; 

                rawData.forEach(d => {
                    let timeVal = d.time || d.timestamp;
                    if (!timeVal) return; 

                    let timeUnix = new Date(timeVal).getTime() / 1000;
                    if (timeUnix === lastTime) return;
                    lastTime = timeUnix;

                    const open = parseFloat(d.open), high = parseFloat(d.high);
                    const low = parseFloat(d.low), close = parseFloat(d.close);
                    const volume = parseFloat(d.volume || 0);

                    if (!isNaN(open) && !isNaN(high) && !isNaN(low) && !isNaN(close)) {
                        candles.push({ time: timeUnix, open: open, high: high, low: low, close: close });
                        volumes.push({ time: timeUnix, value: volume, color: close >= open ? 'rgba(63, 185, 80, 0.4)' : 'rgba(248, 81, 73, 0.4)' });
                    }
                });

                candles.sort((a, b) => a.time - b.time);
                volumes.sort((a, b) => a.time - b.time);

                candleSeries.setData(candles);
                volSeries.setData(volumes);
                
                const mappedMarkers = signalsData.map(sig => ({
                    time: new Date(sig.time).getTime() / 1000,
                    position: sig.position, color: sig.color, shape: sig.shape, text: sig.text
                })).filter(m => !isNaN(m.time)).sort((a, b) => a.time - b.time);

                candleSeries.setMarkers(mappedMarkers);
                chart.timeScale().fitContent();

                status.innerHTML = `✅ Strategy Complete! Found <b style="color:var(--strategy);">${data.total_signals || 0}</b> signals.`;
                status.style.color = "var(--success)";

                // Rendering the current Status
                const currentStatusDiv = document.getElementById('current-status');
                const apiCurrent = data.current_status || {};
                
                const bullScore = apiCurrent.bullish_score || 0;
                const bearScore = apiCurrent.bearish_score || 0;
                
                const bullMatchesStr = String(apiCurrent.matched_bullish || "");
                const bearMatchesStr = String(apiCurrent.matched_bearish || "");

                let bullMatchesArray = bullMatchesStr.split(',').map(s => s.trim()).filter(Boolean);
                let bullMatchesHTML = '';
                BULLISH_RULE_NAMES.forEach((rule, index) => {
                    if (bullMatchesArray.includes(String(index + 1))) {
                        bullMatchesHTML += `<li><span style="color:var(--success)">✅</span> ${rule}</li>`;
                    }
                });

                let bearMatchesArray = bearMatchesStr.split(',').map(s => s.trim()).filter(Boolean);
                let bearMatchesHTML = '';
                BEARISH_RULE_NAMES.forEach((rule, index) => {
                    if (bearMatchesArray.includes(String(index + 1))) {
                        bearMatchesHTML += `<li><span style="color:var(--danger)">✅</span> ${rule}</li>`;
                    }
                });

                currentStatusDiv.innerHTML = `
                    <div class="header-title">Current 5m Candle Status</div>
                    <span class="score-line bullish">🟢 Bullish: ${bullScore}/19</span> &nbsp; | &nbsp; 
                    <span class="score-line bearish">🔴 Bearish: ${bearScore}/18</span>
                    
                    <div class="matched-rules-wrapper" style="display:none;">
                        <div class="matched-rules-col" style="border-left: 4px solid var(--success);">
                            <h4 class="bullish">🟢 Matched Bullish Rules</h4>
                            <ul>${bullMatchesHTML || '<li style="color:#666; font-style:italic;">No conditions matched</li>'}</ul>
                        </div>
                        <div class="matched-rules-col" style="border-left: 4px solid var(--danger);">
                            <h4 class="bearish">🔴 Matched Bearish Rules</h4>
                            <ul>${bearMatchesHTML || '<li style="color:#666; font-style:italic;">No conditions matched</li>'}</ul>
                        </div>
                    </div>
                `;
                currentStatusDiv.style.display = 'block';

                // Historical Trades Table
                const tradesTableDiv = document.getElementById('trades-table');
                if (data.signals && data.signals.length > 0) {
                    let signals = [...data.signals];
                    signals.sort((a, b) => new Date(b.time) - new Date(a.time));
                    let html = `<h3>Historical Trade Signals (${signals.length} Triggers)</h3>
                        <table>
                            <thead><tr><th>Date/Time (IST)</th><th>Signal</th><th>Confluence Score</th></tr></thead>
                            <tbody>`;
                    signals.forEach(sig => {
                        const emoji = sig.color === '#3fb950' ? '🟢' : '🔴';
                        const timeStr = new Date(sig.time).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
                        const maxScore = sig.color === '#3fb950' ? 19 : 18;
                        html += `<tr><td>${timeStr}</td><td>${emoji} ${sig.text}</td><td>${sig.score}/${maxScore}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    tradesTableDiv.innerHTML = html;
                } else {
                    tradesTableDiv.innerHTML = '<h3>No Historical Signals Found (Threshold Not Met)</h3>';
                }
                tradesTableDiv.style.display = 'block';

            } catch (err) {
                console.error(err);
                status.innerHTML = `❌ Failed to run strategy: ${err.message}`;
                status.style.color = "var(--danger)";
            }
        }
    </script>
</body>
</html>
